
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  nodes {
    int id PK
    varchar name
    enum type
    enum protocol
    varchar ip
    int port
    varchar username
    varchar password
    varchar remote_path
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }
  mediation_roles {
    int id PK
    int source_node_id FK
    int destination_node_id FK
    boolean is_active
    timestamp created_at
  }
  cdr_files {
    int id PK
    int node_id FK
    varchar file_name
    varchar local_path
    varchar archive_path
    enum status
    int total_records
    int valid_records
    int filtered_records
    text error_message
    timestamp downloaded_at
    timestamp processed_at
    timestamp uploaded_at
    timestamp archived_at
  }
  cdr_records {
    bigint id PK
    int file_id FK
    varchar a_number
    varchar b_number
    varchar short_code
    varchar record_type
    datetime call_start_time
    int call_duration
    bigint data_volume
    varchar imsi
    varchar imei
    varchar cell_id
    varchar cause_for_term
    text raw_data
    boolean is_filtered
    varchar filter_reason
    timestamp created_at
  }
  upload_log {
    int id PK
    int cdr_file_id FK
    int destination_node_id FK
    enum status
    int attempt_number
    text error_message
    timestamp started_at
    timestamp completed_at
  }
  filter_rules {
    int id PK
    int node_id FK
    varchar rule_name
    varchar rule_field
    enum operator
    varchar rule_value
    enum action
    boolean is_active
    timestamp created_at
  }
  users {
    int id PK
    varchar username
    varchar password
    varchar full_name
    varchar email
    enum role
    boolean is_active
    timestamp last_login
    timestamp created_at
  }
  audit_log {
    bigint id PK
    int user_id FK
    varchar action
    varchar entity
    int entity_id
    json old_value
    json new_value
    varchar ip_address
    timestamp performed_at
  }

  nodes ||--o{ mediation_roles : "source node"
  nodes ||--o{ mediation_roles : "destination node"
  nodes ||--o{ cdr_files : "downloads from"
  nodes ||--o{ upload_log : "uploads to"
  nodes ||--o{ filter_rules : "scoped to"
  cdr_files ||--o{ cdr_records : "contains"
  cdr_files ||--o{ upload_log : "tracked by"
  users ||--o{ audit_log : "performs"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
