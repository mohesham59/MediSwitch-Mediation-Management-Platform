version: '3.8'

services:

  # =========================
  # FTP SERVER (vsftpd)
  # =========================
  ftp-server:
    image: fauria/vsftpd
    container_name: ftp-server
    environment:
      FTP_USER: mediuser
      FTP_PASS: medipass
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      # ✅ FIX: let vsftpd resolve its own hostname instead of hardcoding IP
      PASV_ADDRESS_ENABLE: "YES"
      PASV_ADDR_RESOLVE: "YES"
      PASV_ADDRESS: ftp-server
      LOCAL_UMASK: "022"
      LOG_STDOUT: "YES"
    volumes:
      - ftp-upstream:/home/vsftpd/mediuser/upstream
      - ftp-downstream:/home/vsftpd/mediuser/downstream
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    restart: unless-stopped

  # =========================
  # UPSTREAM NODES (generators)
  # =========================
  msc-generator:
    build:
      context: ./generator
    container_name: msc-generator
    command: ["configs/msc.conf"]
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DIR: /upstream/msc-node/cdr-files
    depends_on:
      - ftp-server
    restart: unless-stopped

  pgw-generator:
    build:
      context: ./generator
    container_name: pgw-generator
    command: ["configs/pgw.conf"]
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DIR: /upstream/pgw-node/cdr-files
    depends_on:
      - ftp-server
    restart: unless-stopped

  smsc-generator:
    build:
      context: ./generator
    container_name: smsc-generator
    command: ["configs/smsc.conf"]
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DIR: /upstream/smsc-node/cdr-files
    depends_on:
      - ftp-server
    restart: unless-stopped

  # =========================
  # MEDIATION ENGINE
  # =========================
  mediation-engine:
    build:
      context: ../MediationEngine
      dockerfile: Dockerfile
    container_name: mediation-engine
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_UPSTREAM_BASE: /upstream
      FTP_DOWNSTREAM_BASE: /downstream
      MAX_FILES_PER_BATCH: "5"
    depends_on:
      - ftp-server
      - msc-generator
      - pgw-generator
      - smsc-generator
    mem_limit: 512m
    restart: unless-stopped

  # =========================
  # DOWNSTREAM NODES (watchers)
  # =========================
  billing-watcher:
    build:
      context: ./Down-Stream-Nodes
    container_name: billing-watcher
    command: ["configs/billing.conf"]
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DIR: /downstream/billing-node/cdr-files
    depends_on:
      - ftp-server
    restart: unless-stopped

  charging-watcher:
    build:
      context: ./Down-Stream-Nodes
    container_name: charging-watcher
    command: ["configs/charging.conf"]
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DIR: /downstream/charging-node/cdr-files
    depends_on:
      - ftp-server
    restart: unless-stopped

  fraud-watcher:
    build:
      context: ./Down-Stream-Nodes
    container_name: fraud-watcher
    command: ["configs/fraud.conf"]
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DIR: /downstream/fraud-node/cdr-files
    depends_on:
      - ftp-server
    restart: unless-stopped

  # =========================
  # WEB APP (monitor)
  # =========================
  mediation-webapp:
    build:
      context: ../mediation-webapp
    container_name: mediation-webapp
    ports:
      - "8080:8080"
    environment:
      FTP_HOST: ftp-server
      FTP_USER: mediuser
      FTP_PASS: medipass
      FTP_DOWNSTREAM_BASE: /downstream
    depends_on:
      - ftp-server
    mem_limit: 512m
    restart: unless-stopped

volumes:
  ftp-upstream:
  ftp-downstream:
