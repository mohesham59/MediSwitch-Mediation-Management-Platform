version: '3.8'

services:
  # =========================
  # UPSTREAM NODES (generators)
  # =========================
  msc-generator:
    build:
      context: ./generator
    container_name: msc-generator
    command: ["configs/msc.conf"]
    volumes:
      - ./Up-Stream-Nodes/msc-node/cdr-files:/data/msc-node/cdr-files
    restart: unless-stopped

  pgw-generator:
    build:
      context: ./generator
    container_name: pgw-generator
    command: ["configs/pgw.conf"]
    volumes:
      - ./Up-Stream-Nodes/pgw-node/cdr-files:/data/pgw-node/cdr-files
    restart: unless-stopped

  smsc-generator:
    build:
      context: ./generator
    container_name: smsc-generator
    command: ["configs/smsc.conf"]
    volumes:
      - ./Up-Stream-Nodes/smsc-node/cdr-files:/data/smsc-node/cdr-files
    restart: unless-stopped

  # =========================
  # MEDIATION ENGINE
  # =========================
  mediation-engine:
    build:
      context: ../MediationEngine          # path to the Maven project
      dockerfile: Dockerfile               # see Dockerfile below
    container_name: mediation-engine
    depends_on:
      - msc-generator
      - pgw-generator
      - smsc-generator
    environment:
      # These must match the mount points below
      UPSTREAM_BASE_PATH: /data/upstream
      DOWNSTREAM_BASE_PATH: /data/downstream
    volumes:
      # ── Upstream: engine reads from these folders ──────────────────────
      - ./Up-Stream-Nodes/msc-node/cdr-files:/data/upstream/msc-node/cdr-files
      - ./Up-Stream-Nodes/pgw-node/cdr-files:/data/upstream/pgw-node/cdr-files
      - ./Up-Stream-Nodes/smsc-node/cdr-files:/data/upstream/smsc-node/cdr-files
      # ── Downstream: engine writes CSV here; watchers read from here ────
      - ./Down-Stream-Nodes/billing-node/cdr-files:/data/downstream/billing-node/cdr-files
      - ./Down-Stream-Nodes/charging-node/cdr-files:/data/downstream/charging-node/cdr-files
      - ./Down-Stream-Nodes/fraud-node/cdr-files:/data/downstream/fraud-node/cdr-files
    restart: unless-stopped

  # =========================
  # DOWNSTREAM NODES (watchers)
  # =========================
  billing-watcher:
    build:
      context: ./Down-Stream-Nodes
    container_name: billing-watcher
    command: ["configs/billing.conf"]
    volumes:
      - ./Down-Stream-Nodes/billing-node/cdr-files:/data/billing-node/cdr-files
    restart: unless-stopped

  charging-watcher:
    build:
      context: ./Down-Stream-Nodes
    container_name: charging-watcher
    command: ["configs/charging.conf"]
    volumes:
      - ./Down-Stream-Nodes/charging-node/cdr-files:/data/charging-node/cdr-files
    restart: unless-stopped

  fraud-watcher:
    build:
      context: ./Down-Stream-Nodes
    container_name: fraud-watcher
    command: ["configs/fraud.conf"]
    volumes:
      - ./Down-Stream-Nodes/fraud-node/cdr-files:/data/fraud-node/cdr-files
    restart: unless-stopped
